<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Error - RevConnect</title>
</head>

<body>
    <section>
        <div class="container" style="padding: 3rem 1rem;">
            <div class="card" style="max-width: 760px; margin: 0 auto; text-align: center;">
                <h1 style="font-size: 1.75rem; margin-bottom: 0.6rem;" th:text="${error ?: 'Application Error'}">Application Error</h1>
                <p class="text-secondary" style="margin-bottom: 1.25rem;" th:text="${message ?: 'Something went wrong while processing your request.'}">Something went wrong while processing your request.</p>
                <div class="flex justify-center gap-2">
                    <a href="javascript:history.back()" class="btn btn-outline">Go Back</a>
                    <a th:href="@{/feed}" class="btn btn-primary">Go to Feed</a>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
