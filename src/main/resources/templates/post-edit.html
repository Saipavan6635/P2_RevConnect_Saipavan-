<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Edit Post - RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 760px; margin: 0 auto; width: 100%;">
                <div class="flex items-center justify-between mb-6">
                    <h1 style="font-size: 1.5rem; margin: 0;">Edit Post</h1>
                    <a th:href="@{'/posts/' + ${postId}}" class="btn btn-outline btn-sm">Back</a>
                </div>

                <div class="card">
                    <form th:action="@{'/posts/' + ${postId} + '/edit'}" method="post" th:object="${postDTO}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="form-group">
                            <label class="form-label" for="content">Content</label>
                            <textarea id="content" th:field="*{content}" class="form-control" rows="6" maxlength="500" required></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="hashtags">Hashtags</label>
                            <input type="text" id="hashtags" th:field="*{hashtags}" class="form-control" />
                        </div>

                        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                            <div class="form-group">
                                <label class="form-label" for="ctaLabel">CTA Label</label>
                                <input type="text" id="ctaLabel" th:field="*{ctaLabel}" class="form-control" />
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="ctaUrl">CTA URL</label>
                                <input type="url" id="ctaUrl" th:field="*{ctaUrl}" class="form-control" />
                            </div>
                        </div>

                        <div class="form-group">
                            <label style="display: inline-flex; align-items: center; gap: 0.5rem;">
                                <input type="checkbox" th:field="*{pinned}" /> Pin to profile
                            </label>
                        </div>

                        <div class="flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a th:href="@{'/posts/' + ${postId}}" class="btn btn-outline">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
