<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Post — RevConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body>
    <nav class="navbar">
        <div class="container navbar-inner">
            <a th:href="@{/feed}" class="navbar-brand">RevConnect</a>
            <nav class="navbar-nav">
                <a th:href="@{/feed}" class="nav-link">🏠</a>
                <a th:href="@{/messages}" class="nav-link">💬</a>
                <a th:href="@{/connections}" class="nav-link">👥</a>
                <a th:href="@{/notifications}" class="nav-link">
                    🔔<span class="badge" th:if="${unreadCount > 0}" th:text="${unreadCount}"></span>
                </a>
                <a th:href="@{/profile}" class="nav-link btn btn-outline btn-sm">👤 <span
                        th:text="${currentUser.username}"></span></a>
                <form th:action="@{/logout}" method="post" style="margin:0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-ghost btn-sm">Sign Out</button>
                </form>
            </nav>
        </div>
    </nav>

    <div class="container page-wrapper" style="max-width: 700px;">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
            <a th:href="@{'/posts/' + ${postId}}" class="btn btn-ghost btn-sm" style="padding: 0.5rem;">🔙</a>
            <h1 style="font-size: 1.75rem;">Edit Post</h1>
        </div>

        <div class="card" style="padding: 2rem;">
            <form th:action="@{'/posts/' + ${postId} + '/edit'}" method="post" th:object="${postDTO}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label class="form-label">Post Content</label>
                    <textarea th:field="*{content}" class="form-control" rows="6" maxlength="500" required
                        placeholder="Update your post..." style="font-size: 1.1rem; line-height: 1.5;"></textarea>
                </div>

                <div class="row" style="gap: 1.5rem; margin-top: 1.5rem;">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Hashtags</label>
                        <input type="text" th:field="*{hashtags}" class="form-control"
                            placeholder="e.g. #tech, #life" />
                    </div>
                </div>

                <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--glass-border);">
                    <h3 style="margin-bottom: 1.25rem; font-size: 1.1rem; color: var(--text-dim);">Post Action (CTA)
                    </h3>

                    <div class="row" style="gap: 1.5rem;">
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">Button Label</label>
                            <input type="text" th:field="*{ctaLabel}" class="form-control"
                                placeholder="e.g. Learn More" />
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label class="form-label">Button URL</label>
                            <input type="url" th:field="*{ctaUrl}" class="form-control" placeholder="https://..." />
                        </div>
                    </div>
                </div>

                <div style="margin-top: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
                    <input type="checkbox" id="pinned" th:field="*{pinned}"
                        style="width: 18px; height: 18px; cursor: pointer;" />
                    <label for="pinned" style="font-weight: 600; cursor: pointer;">📌 Pin to Profile</label>
                </div>

                <div style="margin-top: 2.5rem; display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 2; padding: 1rem; font-weight: 700;">Save
                        Changes</button>
                    <a th:href="@{'/posts/' + ${postId}}" class="btn btn-ghost"
                        style="flex: 1; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
