<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Post - RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 860px; margin: 0 auto; width: 100%;">
                <a th:href="@{/feed}" class="btn btn-outline btn-sm mb-4">Back to Feed</a>

                <div class="card post mb-6">
                    <div class="post-header">
                        <div class="avatar" th:text="${post.author.username.substring(0,1).toUpperCase()}"></div>
                        <div class="post-author">
                            <a th:href="@{'/profile/' + ${post.author.username}}" class="author-name" th:text="${post.author.fullName ?: post.author.username}"></a>
                            <span class="post-time" th:text="${#temporals.format(post.createdAt,'dd MMM yyyy, HH:mm')}"></span>
                        </div>
                        <div style="margin-left: auto;" th:if="${post.author.id == currentUser.id}">
                            <a th:href="@{'/posts/' + ${post.id} + '/edit'}" class="btn btn-outline btn-sm">Edit</a>
                        </div>
                    </div>

                    <div class="post-content" th:text="${post.content}"></div>

                    <div th:if="${post.imageUrl != null and !post.imageUrl.isEmpty()}" class="mb-3">
                        <img th:src="@{${post.imageUrl}}" style="width: 100%; max-height: 520px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border-light);" alt="Post image" />
                    </div>

                    <div class="mb-3" th:if="${post.hashtags != null and !#strings.isEmpty(post.hashtags)}">
                        <a th:each="tag : ${#strings.arraySplit(post.hashtags,',')}" th:href="@{/posts/search(hashtag=${#strings.trim(tag).replace('#','')})}" style="margin-right:0.5rem;" th:text="${#strings.trim(tag).startsWith('#') ? #strings.trim(tag) : '#' + #strings.trim(tag)}"></a>
                    </div>

                    <div th:if="${post.ctaLabel}" class="mb-3">
                        <a class="btn btn-primary" th:href="${post.ctaUrl}" th:text="${post.ctaLabel}" target="_blank"></a>
                    </div>

                    <div class="post-actions">
                        <form th:action="@{'/posts/' + ${post.id} + '/like'}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="action-item"><i data-lucide="heart"></i><span th:text="${likeCount}">0</span></button>
                        </form>
                        <div class="action-item"><i data-lucide="message-circle"></i><span th:text="${comments.size()}">0</span></div>
                        <form th:action="@{'/posts/' + ${post.id} + '/share'}" method="post" style="margin-left: auto;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="action-item"><i data-lucide="share-2"></i><span th:text="${post.shares.size()}">0</span></button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 0.8rem;">Comments</h3>

                    <form th:action="@{'/posts/' + ${post.id} + '/comment'}" method="post" class="mb-4">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <textarea name="content" class="form-control" rows="3" placeholder="Add a comment" required></textarea>
                        <button type="submit" class="btn btn-primary mt-2">Post Comment</button>
                    </form>

                    <div th:if="${comments.empty}" class="text-muted">No comments yet.</div>

                    <div th:each="comment : ${comments}" class="mb-4 pb-4" style="border-bottom: 1px solid var(--border-light);">
                        <div class="flex justify-between items-center">
                            <a th:href="@{'/profile/' + ${comment.author.username}}" class="font-bold" th:text="${comment.author.fullName ?: comment.author.username}"></a>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-muted" th:text="${#temporals.format(comment.createdAt,'dd MMM yyyy, HH:mm')}"></span>
                                <form th:if="${comment.author.id == currentUser.id or post.author.id == currentUser.id}" th:action="@{'/posts/comments/' + ${comment.id} + '/delete'}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="postId" th:value="${post.id}" />
                                    <button type="submit" class="btn btn-ghost btn-sm" style="color: var(--danger);">Delete</button>
                                </form>
                            </div>
                        </div>
                        <div class="text-sm mt-1" th:text="${comment.content}"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
