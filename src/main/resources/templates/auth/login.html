<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In — RevConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body class="auth-page">
    <div class="auth-card">
        <div class="text-center">
            <div class="auth-logo">
                <i data-lucide="sparkles" class="icon-sky" style="width: 32px; height: 32px;"></i>
                <span>RevConnect</span>
            </div>
            <p class="auth-tagline">Welcome back! Please enter your details.</p>
        </div>

        <!-- Alerts - Fixed Boolean evaluation -->
        <div class="alert alert-error" th:if="${param.error != null or errorMessage != null}">
            <i data-lucide="alert-circle" style="width: 18px;"></i>
            <span th:text="${errorMessage ?: 'Invalid username or password.'}"></span>
        </div>
        <div class="alert alert-success" th:if="${param.logout != null or successMessage != null}">
            <i data-lucide="check-circle" style="width: 18px;"></i>
            <span th:text="${successMessage ?: 'You have been logged out.'}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label">Username or Email</label>
                <input type="text" name="usernameOrEmail" class="form-control" placeholder="Enter your details" required
                    autofocus />
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required />
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-4">
                Log In
            </button>
        </form>

        <div style="margin: 2rem 0; display: flex; align-items: center; gap: 1rem;">
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
            <span class="text-xs text-muted" style="font-weight: 600;">OR</span>
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
        </div>

        <p class="text-center text-sm text-secondary">
            Don't have an account?
            <a th:href="@{/register}" class="font-bold icon-sky" style="font-weight: 600;">Create one now</a>
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
