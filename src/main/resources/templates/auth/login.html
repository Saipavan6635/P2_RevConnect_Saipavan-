<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - RevConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
        (function () {
            try {
                var t = localStorage.getItem('revconnect_theme');
                if (!t) {
                    t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body class="auth-page">
    <div style="position: fixed; top: 1rem; right: 1rem; z-index: 20;">
        <button type="button" class="btn btn-outline btn-sm" data-theme-toggle>Dark</button>
    </div>

    <div class="auth-card">
        <div class="text-center">
            <div class="auth-logo">
                <span>RevConnect</span>
            </div>
            <p class="auth-tagline">Welcome back. Sign in to continue.</p>
        </div>

        <div class="alert alert-error" th:if="${param.error != null or errorMessage != null}" style="margin-bottom: 1rem; text-align: left;">
            <i data-lucide="alert-circle" style="width: 16px;"></i>
            <span th:text="${errorMessage ?: 'Invalid username/email or password.'}"></span>
        </div>

        <div class="alert alert-success" th:if="${param.logout != null or successMessage != null}" style="margin-bottom: 1rem; text-align: left;">
            <i data-lucide="check-circle" style="width: 16px;"></i>
            <span th:text="${successMessage ?: 'You have been logged out successfully.'}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label class="form-label" for="usernameOrEmail">Username or Email</label>
                <input type="text" id="usernameOrEmail" name="usernameOrEmail" class="form-control"
                    placeholder="Enter username or email" required autofocus />
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Enter password" required />
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-4">
                <i data-lucide="log-in" style="width: 16px;"></i>
                Sign In
            </button>
        </form>

        <div style="margin: 1.2rem 0; display: flex; align-items: center; gap: 0.8rem;">
            <div style="flex: 1; height: 1px; background: var(--border-light);"></div>
            <span class="text-xs text-muted" style="font-weight: 600;">OR</span>
            <div style="flex: 1; height: 1px; background: var(--border-light);"></div>
        </div>

        <p class="text-center text-sm text-secondary">
            New to RevConnect?
            <a th:href="@{/register}" class="font-bold" style="font-weight: 700;">Create an account</a>
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
