<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — RevConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body class="auth-page">
    <div class="auth-card" style="max-width: 520px;">
        <div class="text-center">
            <div class="auth-logo">
                <i data-lucide="sparkles" class="icon-lavender" style="width: 32px; height: 32px;"></i>
                <span>RevConnect</span>
            </div>
            <p class="auth-tagline">Join our community and connect with others.</p>
        </div>

        <!-- Validation / server-side error messages -->
        <div class="alert alert-error" th:if="${errorMessage}">
            <i data-lucide="alert-circle" style="width: 18px;"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Bean validation errors -->
        <div class="alert alert-error" th:if="${#fields.hasErrors('*')}" th:each="err : ${#fields.allErrors()}"
            th:text="${err}">
        </div>

        <!--
            Register form — REQUIRES CSRF token just like login.
            th:object="${registerDTO}" binds to the RegisterDTO added in model.
        -->
        <form th:action="@{/register}" th:object="${registerDTO}" method="post">
            <!-- CSRF Token — REQUIRED by Spring Security -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label class="form-label" for="fullName">Full Name</label>
                    <input type="text" id="fullName" th:field="*{fullName}" class="form-control"
                        placeholder="John Doe" />
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label class="form-label" for="username">Username <span
                            style="color:var(--danger);">*</span></label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="johndoe"
                        required minlength="3" maxlength="50" />
                    <small class="text-muted text-xs" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
                        style="color: var(--danger);"></small>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address <span style="color:var(--danger);">*</span></label>
                <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="john@example.com"
                    required />
                <small class="text-muted text-xs" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                    style="color: var(--danger);"></small>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password <span style="color:var(--danger);">*</span></label>
                <input type="password" id="password" th:field="*{password}" class="form-control"
                    placeholder="Minimum 6 characters" required minlength="6" />
                <small class="text-muted text-xs" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                    style="color: var(--danger);"></small>
            </div>

            <div class="form-group">
                <label class="form-label" for="role">Account Type</label>
                <select id="role" th:field="*{role}" class="form-control">
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-4">
                <i data-lucide="user-plus" style="width: 18px; margin-right: 0.5rem;"></i>
                Create Account
            </button>
        </form>

        <div style="margin: 2rem 0; display: flex; align-items: center; gap: 1rem;">
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
            <span class="text-xs text-muted" style="font-weight: 600;">OR</span>
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
        </div>

        <p class="text-center text-sm text-secondary">
            Already have an account?
            <a th:href="@{/login}" class="font-bold icon-lavender" style="font-weight: 600;">Sign In</a>
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
