<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - RevConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
        (function () {
            try {
                var t = localStorage.getItem('revconnect_theme');
                if (!t) {
                    t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body class="auth-page">
    <div style="position: fixed; top: 1rem; right: 1rem; z-index: 20;">
        <button type="button" class="btn btn-outline btn-sm" data-theme-toggle>Dark</button>
    </div>

    <div class="auth-card" style="max-width: 560px;">
        <div class="text-center">
            <div class="auth-logo">
                <span>RevConnect</span>
            </div>
            <p class="auth-tagline">Create your account to start posting and connecting.</p>
        </div>

        <div class="alert alert-error" th:if="${errorMessage}">
            <i data-lucide="alert-circle" style="width: 16px;"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <div class="alert alert-error" th:if="${#fields.hasErrors('*')}" th:each="err : ${#fields.allErrors()}" th:text="${err}"></div>

        <form th:action="@{/register}" th:object="${registerDTO}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div style="display: flex; gap: 0.8rem; margin-bottom: 0.9rem;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label class="form-label" for="fullName">Full Name</label>
                    <input type="text" id="fullName" th:field="*{fullName}" class="form-control" placeholder="John Doe" />
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label class="form-label" for="username">Username <span style="color:var(--danger);">*</span></label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="johndoe" required minlength="3" maxlength="50" />
                    <small class="text-muted text-xs" th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color: var(--danger);"></small>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email <span style="color:var(--danger);">*</span></label>
                <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="john@example.com" required />
                <small class="text-muted text-xs" th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: var(--danger);"></small>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password <span style="color:var(--danger);">*</span></label>
                <input type="password" id="password" th:field="*{password}" class="form-control"
                    placeholder="Minimum 6 characters" required minlength="6" />
                <small class="text-muted text-xs" th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: var(--danger);"></small>
            </div>

            <div class="form-group">
                <label class="form-label" for="role">Account Type</label>
                <select id="role" th:field="*{role}" class="form-control">
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-4">
                <i data-lucide="user-plus" style="width: 16px;"></i>
                Create Account
            </button>
        </form>

        <div style="margin: 1.2rem 0; display: flex; align-items: center; gap: 0.8rem;">
            <div style="flex: 1; height: 1px; background: var(--border-light);"></div>
            <span class="text-xs text-muted" style="font-weight: 600;">OR</span>
            <div style="flex: 1; height: 1px; background: var(--border-light);"></div>
        </div>

        <p class="text-center text-sm text-secondary">
            Already have an account?
            <a th:href="@{/login}" class="font-bold" style="font-weight: 700;">Sign in</a>
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
