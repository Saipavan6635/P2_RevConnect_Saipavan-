<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title th:text="${profileUser.username + ' — RevConnect'}">Profile</title>
</head>

<body>
    <section>
        <div class="container main-content">
            <!-- Profile Column -->
            <div style="grid-column: 1 / 3;">
                <div class="card card-flush mb-8">
                    <div class="profile-cover"></div>
                    <div class="profile-avatar-container">
                        <div class="avatar avatar-lg" style="overflow: hidden;">
                            <img th:if="${profileUser.profilePicture != null && !profileUser.profilePicture.isEmpty()}"
                                th:src="@{${profileUser.profilePicture}}"
                                style="width: 100%; height: 100%; object-fit: cover;" alt="" />
                            <span th:if="${profileUser.profilePicture == null || profileUser.profilePicture.isEmpty()}"
                                th:text="${profileUser.fullName != null ? profileUser.fullName.substring(0,1).toUpperCase() : profileUser.username.substring(0,1).toUpperCase()}"
                                style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--primary-gradient); color: white;"></span>
                        </div>

                        <div class="flex gap-4 mb-4">
                            <div th:if="${isOwnProfile}">
                                <a th:href="@{/profile/edit}" class="btn btn-outline btn-sm">
                                    <i data-lucide="edit-3" style="width: 16px;"></i>
                                    <span>Edit</span>
                                </a>
                            </div>
                            <div th:if="${!isOwnProfile}" class="flex gap-2">
                                <form th:if="${!isConnected and !hasPendingRequest}"
                                    th:action="@{'/connections/request/' + ${profileUser.id}}" method="post">
                                    <button type="submit" class="btn btn-primary btn-sm">Connect</button>
                                </form>
                                <button th:if="${hasPendingRequest}" class="btn btn-outline btn-sm"
                                    disabled>Pending</button>
                                <button th:if="${isConnected}" class="btn btn-outline btn-sm"
                                    disabled>Connected</button>

                                <form th:if="${!isFollowing}" th:action="@{'/follow/' + ${profileUser.id}}"
                                    method="post">
                                    <button type="submit" class="btn btn-outline btn-sm">Follow</button>
                                </form>
                                <form th:if="${isFollowing}" th:action="@{'/follow/' + ${profileUser.id} + '/unfollow'}"
                                    method="post">
                                    <button type="submit" class="btn btn-outline btn-sm">Unfollow</button>
                                </form>

                                <a th:href="@{'/messages/' + ${profileUser.id}}" class="btn btn-outline btn-sm">
                                    <i data-lucide="mail" style="width: 16px;"></i>
                                </a>
                            </div>
                        </div>
                    </div>

                    <div style="padding: 1.5rem 3rem 3rem;">
                        <h1 class="mb-2" style="font-size: 2.25rem;">
                            <span th:text="${profileUser.fullName ?: profileUser.username}"></span>
                            <span th:if="${profileUser.role.name() != 'PERSONAL'}" class="badge ml-2"
                                th:text="${profileUser.role}"></span>
                        </h1>
                        <p class="text-secondary text-lg mb-6" th:text="'@' + ${profileUser.username}"></p>

                        <p class="mb-8 post-content" th:if="${profileUser.bio}" th:text="${profileUser.bio}"></p>

                        <div class="flex gap-6 text-sm text-muted mb-8">
                            <div th:if="${profileUser.location}" class="flex items-center gap-2">
                                <i data-lucide="map-pin" class="icon-sky" style="width: 16px;"></i>
                                <span th:text="${profileUser.location}"></span>
                            </div>
                            <div th:if="${profileUser.website}" class="flex items-center gap-2">
                                <i data-lucide="link" class="icon-lavender" style="width: 16px;"></i>
                                <a th:href="${profileUser.website}" th:text="${profileUser.website}"
                                    class="hover:text-primary"></a>
                            </div>
                            <div class="flex items-center gap-2">
                                <i data-lucide="calendar" class="icon-mint" style="width: 16px;"></i>
                                <span>Joined <span
                                        th:text="${#temporals.format(profileUser.createdAt,'MMMM yyyy')}"></span></span>
                            </div>
                        </div>

                        <div class="flex gap-12 pt-8 justify-start px-2"
                            style="border-top: 1px solid var(--border-light);">
                            <div class="stat-item-minimal">
                                <div class="stat-value" th:text="${followerCount}">0</div>
                                <div class="stat-label">Followers</div>
                            </div>
                            <div class="stat-item-minimal" style="margin-left: 1rem;">
                                <div class="stat-value" th:text="${followingCount}">0</div>
                                <div class="stat-label">Following</div>
                            </div>
                            <div class="stat-item-minimal" style="margin-left: 1rem;">
                                <div class="stat-value" th:text="${connectionCount}">0</div>
                                <div class="stat-label">Connections</div>
                            </div>
                        </div>
                    </div>
                </div>

                <h3 class="widget-title mb-6">Recent Activity</h3>

                <div th:if="${!canViewPosts}" class="card text-center py-12">
                    <i data-lucide="lock" class="mx-auto mb-4 text-muted" style="width: 48px; height: 48px;"></i>
                    <h3 class="font-bold">Private Profile</h3>
                    <p class="text-secondary">Connect to see their thoughts.</p>
                </div>

                <div th:if="${canViewPosts}">
                    <div th:if="${posts == null or posts.empty}" class="card text-center py-12">
                        <p class="text-secondary">No activity yet.</p>
                    </div>

                    <div th:each="post : ${posts}" class="card mb-6 post shadow-sm">
                        <div class="post-header mb-4">
                            <div class="avatar" style="width: 32px; height: 32px; font-size: 0.8rem;"
                                th:text="${post.author.username.substring(0,1).toUpperCase()}"></div>
                            <div class="post-author">
                                <span class="author-name" style="font-size: 0.9rem;"
                                    th:text="${post.author.fullName ?: post.author.username}"></span>
                                <span class="post-time" style="font-size: 0.7rem;"
                                    th:text="${#temporals.format(post.createdAt,'dd MMM, HH:mm')}"></span>
                            </div>
                            <div th:if="${isOwnProfile}" style="margin-left: auto;">
                                <form th:action="@{'/posts/' + ${post.id} + '/delete'}" method="post"
                                    onsubmit="return confirm('Delete this post?');">
                                    <button type="submit" class="btn btn-ghost btn-sm"
                                        style="color: var(--danger); padding: 0.25rem;">
                                        <i data-lucide="trash-2" style="width: 14px;"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div class="post-content" th:text="${post.content}"></div>
                        <div class="flex gap-3 mt-4" th:if="${post.hashtags}">
                            <span th:each="tag : ${#strings.arraySplit(post.hashtags,',')}"
                                class="text-xs font-bold icon-sky"
                                th:text="${#strings.trim(tag).startsWith('#') ? #strings.trim(tag) : '#' + #strings.trim(tag)}"></span>
                        </div>
                        <div class="post-actions">
                            <form th:action="@{'/posts/' + ${post.id} + '/like'}" method="post">
                                <button type="submit" class="action-item">
                                    <i data-lucide="heart" class="icon-peach"></i>
                                    <span th:text="${post.likes.size()}">0</span>
                                </button>
                            </form>
                            <a th:href="@{'/posts/' + ${post.id}}" class="action-item">
                                <i data-lucide="message-circle" class="icon-sky"></i>
                                <span th:text="${post.comments.size()}">0</span>
                            </a>
                            <form th:action="@{'/posts/' + ${post.id} + '/share'}" method="post"
                                style="margin-left: auto;">
                                <button type="submit" class="action-item">
                                    <i data-lucide="share-2" class="icon-mint"></i>
                                    <span th:text="${post.shares.size()}">0</span>
                                </button>
                            </form>
                            <form th:if="${post.author.id == currentUser.id}"
                                th:action="@{'/posts/' + ${post.id} + '/delete'}" method="post"
                                onsubmit="return confirm('Delete this post?');" style="margin-left: 1rem;">
                                <button type="submit" class="action-item" style="color: var(--danger);">
                                    <i data-lucide="trash-2"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <aside class="sidebar-right">
                <div class="card mb-6">
                    <div class="widget-title">Network Insight</div>
                    <p class="text-xs text-secondary leading-relaxed">
                        This creator is part of the RevConnect community since
                        <span th:text="${#temporals.format(profileUser.createdAt,'yyyy')}"></span>.
                    </p>
                </div>
            </aside>
        </div>
    </section>
</body>

</html>
