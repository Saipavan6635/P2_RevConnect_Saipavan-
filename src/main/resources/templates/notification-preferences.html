<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Notification Preferences - RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 680px; margin: 0 auto; width: 100%;">
                <div class="flex items-center justify-between mb-6">
                    <h1 style="font-size: 1.5rem; margin: 0;">Notification Preferences</h1>
                    <a th:href="@{/notifications}" class="btn btn-outline btn-sm">Back</a>
                </div>

                <div class="card">
                    <form th:action="@{/notifications/preferences}" method="post" th:object="${prefsDTO}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                            <label class="card" style="margin: 0; cursor: pointer; display: flex; align-items: center; gap: 0.6rem;">
                                <input type="checkbox" th:field="*{connectionRequests}" /> Connection Requests
                            </label>
                            <label class="card" style="margin: 0; cursor: pointer; display: flex; align-items: center; gap: 0.6rem;">
                                <input type="checkbox" th:field="*{connectionAccepted}" /> Connection Accepted
                            </label>
                            <label class="card" style="margin: 0; cursor: pointer; display: flex; align-items: center; gap: 0.6rem;">
                                <input type="checkbox" th:field="*{newFollowers}" /> New Followers
                            </label>
                            <label class="card" style="margin: 0; cursor: pointer; display: flex; align-items: center; gap: 0.6rem;">
                                <input type="checkbox" th:field="*{postLikes}" /> Post Likes
                            </label>
                            <label class="card" style="margin: 0; cursor: pointer; display: flex; align-items: center; gap: 0.6rem;">
                                <input type="checkbox" th:field="*{postComments}" /> Post Comments
                            </label>
                            <label class="card" style="margin: 0; cursor: pointer; display: flex; align-items: center; gap: 0.6rem;">
                                <input type="checkbox" th:field="*{postShares}" /> Post Shares
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full mt-4">Save Preferences</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
