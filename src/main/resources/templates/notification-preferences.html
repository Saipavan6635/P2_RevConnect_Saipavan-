<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notification Settings — RevConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body>
    <nav class="navbar">
        <div class="container navbar-inner">
            <a th:href="@{/feed}" class="navbar-brand">RevConnect</a>
            <nav class="navbar-nav">
                <a th:href="@{/feed}" class="nav-link">🏠</a>
                <a th:href="@{/messages}" class="nav-link">💬</a>
                <a th:href="@{/connections}" class="nav-link">👥</a>
                <a th:href="@{/notifications}" class="nav-link">
                    🔔<span class="badge" th:if="${unreadCount > 0}" th:text="${unreadCount}"></span>
                </a>
                <a th:href="@{/profile}" class="nav-link btn btn-outline btn-sm">👤 <span
                        th:text="${currentUser.username}"></span></a>
                <form th:action="@{/logout}" method="post" style="margin:0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-ghost btn-sm">Sign Out</button>
                </form>
            </nav>
        </div>
    </nav>

    <div class="container page-wrapper" style="max-width: 600px;">
        <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem;">
            <a th:href="@{/notifications}" class="btn btn-ghost btn-sm" style="padding: 0.5rem;">🔙</a>
            <h1 style="font-size: 1.75rem;">Notification Settings</h1>
        </div>

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"
            style="margin-bottom: 1.5rem; border-radius: 1rem; border-left: 4px solid #10b981;"></div>

        <div class="card" style="padding: 2.5rem;">
            <p style="color: var(--text-dim); margin-bottom: 2rem; font-size: 0.95rem;">
                Choose which events you want to be notified about.
            </p>

            <form th:action="@{/notifications/preferences}" method="post" th:object="${prefsDTO}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                    <div class="checkbox-group"
                        style="padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 0.75rem; border: 1px solid var(--glass-border);">
                        <input type="checkbox" id="cr" th:field="*{connectionRequests}" />
                        <label for="cr" style="font-weight: 600;">Connection Requests</label>
                    </div>

                    <div class="checkbox-group"
                        style="padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 0.75rem; border: 1px solid var(--glass-border);">
                        <input type="checkbox" id="ca" th:field="*{connectionAccepted}" />
                        <label for="ca" style="font-weight: 600;">Connection Accepted</label>
                    </div>

                    <div class="checkbox-group"
                        style="padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 0.75rem; border: 1px solid var(--glass-border);">
                        <input type="checkbox" id="nf" th:field="*{newFollowers}" />
                        <label for="nf" style="font-weight: 600;">New Followers</label>
                    </div>

                    <div class="checkbox-group"
                        style="padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 0.75rem; border: 1px solid var(--glass-border);">
                        <input type="checkbox" id="pl" th:field="*{postLikes}" />
                        <label for="pl" style="font-weight: 600;">Post Likes</label>
                    </div>

                    <div class="checkbox-group"
                        style="padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 0.75rem; border: 1px solid var(--glass-border);">
                        <input type="checkbox" id="pc" th:field="*{postComments}" />
                        <label for="pc" style="font-weight: 600;">Post Comments</label>
                    </div>

                    <div class="checkbox-group"
                        style="padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 0.75rem; border: 1px solid var(--glass-border);">
                        <input type="checkbox" id="ps" th:field="*{postShares}" />
                        <label for="ps" style="font-weight: 600;">Post Shares</label>
                    </div>
                </div>

                <div style="margin-top: 2.5rem;">
                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; padding: 1rem; font-weight: 700;">Save Settings</button>
                </div>
            </form>
        </div>
    </div>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
