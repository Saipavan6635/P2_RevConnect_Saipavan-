<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>User Search - RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 860px; margin: 0 auto; width: 100%;">
                <h1 style="font-size: 1.5rem; margin-bottom: 0.35rem;">User Search</h1>
                <p class="text-sm text-muted mb-6" th:text="'Results for: ' + ${query}"></p>

                <div class="card" th:if="${results.empty}">
                    <p class="text-muted">No users found for this search query.</p>
                </div>

                <div class="card mb-3" th:each="user : ${results}">
                    <div class="flex items-center justify-between gap-3">
                        <div class="flex items-center gap-3">
                            <div class="avatar" style="overflow: hidden;">
                                <img th:if="${user.profilePicture != null && !#strings.isEmpty(user.profilePicture)}" th:src="@{${user.profilePicture}}" style="width:100%; height:100%; object-fit: cover;" alt="" />
                                <span th:if="${user.profilePicture == null || #strings.isEmpty(user.profilePicture)}" th:text="${user.username.substring(0,1).toUpperCase()}"></span>
                            </div>
                            <div>
                                <a th:href="@{'/profile/' + ${user.username}}" class="font-bold" th:text="${user.fullName ?: user.username}"></a>
                                <div class="text-xs text-muted" th:text="'@' + ${user.username}"></div>
                            </div>
                        </div>
                        <a th:href="@{'/profile/' + ${user.username}}" class="btn btn-outline btn-sm">View Profile</a>
                    </div>
                    <div class="text-sm text-secondary mt-2" th:if="${user.bio}" th:text="${user.bio}"></div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
