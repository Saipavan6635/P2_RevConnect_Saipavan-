<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title th:text="'Hashtag #' + ${hashtag} + ' - RevConnect'">Hashtag</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 860px; margin: 0 auto; width: 100%;">
                <div class="flex items-center justify-between mb-6">
                    <h1 style="font-size: 1.5rem; margin: 0;">Hashtag Search</h1>
                    <a th:href="@{/feed}" class="btn btn-outline btn-sm">Back to Feed</a>
                </div>

                <p class="text-sm text-muted mb-6">Showing posts for <strong th:text="'#' + ${hashtag}"></strong></p>

                <div th:if="${posts == null or posts.empty}" class="card text-muted">No posts found for this hashtag.</div>

                <div th:each="post : ${posts}" class="card mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <a th:href="@{'/profile/' + ${post.author.username}}" class="font-bold" th:text="${post.author.fullName ?: post.author.username}"></a>
                        <span class="text-xs text-muted" th:text="${#temporals.format(post.createdAt,'dd MMM yyyy')}"></span>
                    </div>
                    <div class="text-sm" th:text="${post.content}"></div>
                    <div class="mt-3">
                        <a th:href="@{'/posts/' + ${post.id}}" class="btn btn-outline btn-sm">Open Post</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
