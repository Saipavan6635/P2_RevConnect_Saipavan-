<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Edit Profile - RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 760px; margin: 0 auto; width: 100%;">
                <div class="flex items-center justify-between mb-6">
                    <h1 style="font-size: 1.5rem; margin: 0;">Edit Profile</h1>
                    <a th:href="@{/profile}" class="btn btn-outline btn-sm">Back to Profile</a>
                </div>

                <div class="card mb-6">
                    <form th:action="@{/profile/edit}" method="post" th:object="${profileDTO}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" th:field="*{fullName}" class="form-control" />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Profile Privacy</label>
                                <select th:field="*{privacySetting}" class="form-control">
                                    <option th:each="p : ${privacyOptions}" th:value="${p}" th:text="${p}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Bio</label>
                            <textarea th:field="*{bio}" class="form-control" rows="4"></textarea>
                        </div>

                        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                            <div class="form-group">
                                <label class="form-label">Location</label>
                                <input type="text" th:field="*{location}" class="form-control" />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Website</label>
                                <input type="url" th:field="*{website}" class="form-control" />
                            </div>
                        </div>

                        <div th:if="${currentUser.role.name() != 'PERSONAL'}" class="mt-6 pt-6" style="border-top: 1px solid var(--border-light);">
                            <h3 style="margin-bottom: 0.8rem;">Creator / Business Details</h3>

                            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                                <div class="form-group">
                                    <label class="form-label">Category / Industry</label>
                                    <input type="text" th:field="*{category}" class="form-control" />
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Contact Information</label>
                                    <input type="text" th:field="*{contactInfo}" class="form-control" />
                                </div>
                            </div>

                            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                                <div class="form-group">
                                    <label class="form-label">External Links</label>
                                    <textarea th:field="*{externalLinks}" class="form-control" rows="3"
                                        placeholder="One link per line or comma-separated"></textarea>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Products / Services</label>
                                    <textarea th:field="*{offerings}" class="form-control" rows="3"
                                        placeholder="List offerings or services"></textarea>
                                </div>
                            </div>

                            <div th:if="${currentUser.role.name() == 'BUSINESS'}" class="grid" style="grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                                <div class="form-group">
                                    <label class="form-label">Business Address</label>
                                    <input type="text" th:field="*{businessAddress}" class="form-control" />
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Business Hours</label>
                                    <input type="text" th:field="*{businessHours}" class="form-control" placeholder="Mon-Fri 9AM-6PM" />
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-between items-center mt-2">
                            <div class="text-xs text-muted">Changes apply immediately to your profile.</div>
                            <button type="submit" class="btn btn-primary">Save Profile</button>
                        </div>
                    </form>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 0.8rem;">Profile Picture</h3>
                    <form th:action="@{/profile/picture}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="grid" style="grid-template-columns: 120px 1fr auto; gap: 0.75rem; align-items: center;">
                            <div class="avatar avatar-md" style="overflow: hidden; width: 72px; height: 72px;">
                                <img th:if="${currentUser.profilePicture != null && !currentUser.profilePicture.isEmpty()}"
                                    th:src="@{${currentUser.profilePicture}}" style="width: 100%; height: 100%; object-fit: cover;" alt="" />
                                <span th:if="${currentUser.profilePicture == null || currentUser.profilePicture.isEmpty()}"
                                    th:text="${currentUser.username.substring(0,1).toUpperCase()}"></span>
                            </div>
                            <input type="file" name="file" accept="image/*" class="form-control" />
                            <button type="submit" class="btn btn-outline">Upload</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
