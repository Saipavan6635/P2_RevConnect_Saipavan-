<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Notifications - RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 860px; margin: 0 auto; width: 100%;">
                <div class="flex items-center justify-between mb-6">
                    <h1 style="font-size: 1.5rem; margin: 0;">Notifications</h1>
                    <div class="flex gap-2">
                        <a th:href="@{/notifications/preferences}" class="btn btn-outline btn-sm">Preferences</a>
                        <form th:if="${!notifications.empty}" th:action="@{/notifications/clear}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-ghost btn-sm" style="color: var(--danger);">Clear All</button>
                        </form>
                    </div>
                </div>

                <div class="card text-center" th:if="${notifications.empty}">
                    <p class="text-muted">No notifications available.</p>
                </div>

                <div th:each="n : ${notifications}" class="card mb-3">
                    <div class="flex justify-between items-center gap-3">
                        <div>
                            <div class="font-bold" th:text="${n.message}">Notification message</div>
                            <div class="text-xs text-muted mt-1" th:text="${#temporals.format(n.createdAt,'dd MMM yyyy, HH:mm')}"></div>
                        </div>
                        <div class="flex gap-2">
                            <a th:if="${n.referenceId != null}" th:href="@{'/posts/' + ${n.referenceId}}" class="btn btn-outline btn-sm">Open</a>
                            <form th:if="${!n.read}" th:action="@{'/notifications/read/' + ${n.id}}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-outline btn-sm">Mark Read</button>
                            </form>
                            <form th:action="@{'/notifications/delete/' + ${n.id}}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-ghost btn-sm" style="color: var(--danger);">Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
