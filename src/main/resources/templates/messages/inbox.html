<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Messages — RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content">
            <div style="grid-column: 1 / 3;">
                <h1 style="font-size: 1.5rem;" class="mb-6">Messages</h1>

                <div class="card card-flush">
                    <div th:if="${contacts.empty}" class="text-center" style="padding: 4rem;">
                        <i data-lucide="message-square"
                            style="width: 48px; height: 48px; margin: 0 auto 1rem; color: var(--text-muted);"></i>
                        <p class="text-secondary mb-4">You have no messages yet.</p>
                        <a th:href="@{/profile/search(q='')}" class="btn btn-primary btn-sm">Start a Conversation</a>
                    </div>

                    <div th:each="contact : ${contacts}" class="hover:bg-soft"
                        style="border-bottom: 1px solid var(--border-color); transition: var(--transition-fast);">
                        <a th:href="@{'/messages/' + ${contact.id}}"
                            style="display: flex; align-items: center; gap: 1rem; padding: 1.25rem;">
                            <div class="avatar" th:text="${contact.username.substring(0,1).toUpperCase()}"></div>
                            <div style="flex: 1;">
                                <div class="font-bold" th:text="${contact.fullName ?: contact.username}"></div>
                                <div class="text-xs text-secondary" th:text="'@' + ${contact.username}"></div>
                            </div>
                            <div class="btn btn-ghost btn-sm">
                                <i data-lucide="chevron-right" style="width: 18px;"></i>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <aside class="sidebar-right">
                <div class="card">
                    <div class="widget-title">Privacy</div>
                    <p class="text-xs text-secondary">Messages are private between you and the recipient.</p>
                </div>
            </aside>
        </div>
    </section>
</body>

</html>
