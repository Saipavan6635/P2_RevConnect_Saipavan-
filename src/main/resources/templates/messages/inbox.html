<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Messages - RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 860px; margin: 0 auto; width: 100%;">
                <div class="flex items-center justify-between mb-6">
                    <h1 style="font-size: 1.5rem; margin: 0;">Messages</h1>
                    <span class="badge" th:text="${messageUnreadCount} + ' unread'"></span>
                </div>

                <div class="card" th:if="${contacts.empty}">
                    <p class="text-muted">No conversations yet. Start by messaging a user profile.</p>
                </div>

                <div class="card" th:each="contact : ${contacts}" style="padding: 0;">
                    <a th:href="@{'/messages/' + ${contact.id}}" class="flex items-center justify-between" style="padding: 1rem 1.1rem;">
                        <div class="flex items-center gap-3">
                            <div class="avatar" th:text="${contact.username.substring(0,1).toUpperCase()}"></div>
                            <div>
                                <div class="font-bold" th:text="${contact.fullName ?: contact.username}"></div>
                                <div class="text-xs text-muted" th:text="'@' + ${contact.username}"></div>
                            </div>
                        </div>
                        <span class="text-sm text-muted">Open</span>
                    </a>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
