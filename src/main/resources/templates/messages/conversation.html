<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title th:text="'Conversation with ' + ${contact.username} + ' - RevConnect'">Conversation</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 860px; margin: 0 auto; width: 100%;">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <a th:href="@{/messages}" class="btn btn-outline btn-sm">Back</a>
                        <div class="avatar" th:text="${contact.username.substring(0,1).toUpperCase()}"></div>
                        <div>
                            <div class="font-bold" th:text="${contact.fullName ?: contact.username}"></div>
                            <div class="text-xs text-muted" th:text="'@' + ${contact.username}"></div>
                        </div>
                    </div>
                    <form th:action="@{'/messages/' + ${contact.id} + '/delete'}" method="post" class="confirm-delete">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="btn btn-ghost btn-sm" type="submit" style="color: var(--danger);">Delete Conversation</button>
                    </form>
                </div>

                <div class="card" style="height: 460px; display: flex; flex-direction: column;">
                    <div style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.6rem; padding: 0.5rem;">
                        <div th:each="msg : ${messages}" th:style="${msg.sender.id == currentUser.id} ? 'align-self:flex-end; max-width:74%; background:#18181b; color:#fff; padding:0.6rem 0.75rem; border-radius:10px;' : 'align-self:flex-start; max-width:74%; background:#f4f4f5; color:#18181b; padding:0.6rem 0.75rem; border-radius:10px; border:1px solid #e4e4e7;'">
                            <div th:text="${msg.content}"></div>
                            <div class="text-xs" th:style="${msg.sender.id == currentUser.id} ? 'color:#d4d4d8; margin-top:0.2rem; text-align:right;' : 'color:#71717a; margin-top:0.2rem; text-align:right;'" th:text="${#temporals.format(msg.createdAt, 'HH:mm')}"></div>
                        </div>
                    </div>

                    <form th:action="@{'/messages/' + ${contact.id} + '/send'}" method="post" class="flex gap-2" style="padding-top: 0.6rem; border-top: 1px solid var(--border-light);">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="text" name="content" class="form-control" placeholder="Write a message" required autocomplete="off" />
                        <button type="submit" class="btn btn-primary">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
