<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Feed - RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content">
            <aside class="sidebar-left">
                <div class="card">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="avatar" style="overflow: hidden;">
                            <img th:if="${currentUser.profilePicture != null && !currentUser.profilePicture.isEmpty()}"
                                th:src="@{${currentUser.profilePicture}}" style="width: 100%; height: 100%; object-fit: cover;" alt="" />
                            <span th:if="${currentUser.profilePicture == null || currentUser.profilePicture.isEmpty()}"
                                th:text="${currentUser.username.substring(0,1).toUpperCase()}"></span>
                        </div>
                        <div>
                            <div class="font-bold" th:text="${currentUser.fullName ?: currentUser.username}"></div>
                            <div class="text-xs text-muted" th:text="'@' + ${currentUser.username}"></div>
                        </div>
                    </div>

                    <div class="grid" style="grid-template-columns: repeat(2, 1fr); gap: 0.6rem;">
                        <div class="card" style="margin: 0; padding: 0.7rem; text-align: center;">
                            <div class="font-bold" th:text="${followerCount ?: 0}">0</div>
                            <div class="text-xs text-muted">Followers</div>
                        </div>
                        <div class="card" style="margin: 0; padding: 0.7rem; text-align: center;">
                            <div class="font-bold" th:text="${connectionCount ?: 0}">0</div>
                            <div class="text-xs text-muted">Connections</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="widget-title">Quick Access</div>
                    <div class="flex" style="flex-direction: column; gap: 0.35rem;">
                        <a class="nav-link" th:href="@{/profile}">Profile</a>
                        <a class="nav-link" th:href="@{/connections}">Connections</a>
                        <a class="nav-link" th:href="@{/analytics}">Analytics</a>
                        <a class="nav-link" th:href="@{/notifications/preferences}">Notification Preferences</a>
                    </div>
                </div>
            </aside>

            <div class="feed-column">
                <div class="card mb-6">
                    <form th:action="@{/feed/post}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="form-group">
                            <label class="form-label" for="postContent">Create Post</label>
                            <textarea id="postContent" name="content" class="form-control" rows="4"
                                placeholder="Share an update" required></textarea>
                            <div id="charCounter" class="text-xs text-muted mt-1">0 / 500</div>
                        </div>

                        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                            <div class="form-group">
                                <label class="form-label" for="hashtagField">Hashtags</label>
                                <input id="hashtagField" type="text" name="hashtags" class="form-control"
                                    placeholder="#java, #springboot" />
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="image">Image (optional)</label>
                                <input id="image" type="file" name="image" accept="image/*" class="form-control" />
                            </div>
                        </div>

                        <div th:if="${currentUser.role.name() != 'PERSONAL'}" class="grid"
                            style="grid-template-columns: repeat(2, 1fr); gap: 0.75rem;">
                            <div class="form-group">
                                <label class="form-label" for="postType">Post Type</label>
                                <select id="postType" name="postType" class="form-control">
                                    <option value="REGULAR">Regular</option>
                                    <option value="PROMOTIONAL">Promotional</option>
                                    <option value="ANNOUNCEMENT">Announcement</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="scheduledAt">Schedule (optional)</label>
                                <input id="scheduledAt" type="datetime-local" name="scheduledAt" class="form-control" />
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="ctaLabel">CTA Label (optional)</label>
                                <input id="ctaLabel" type="text" name="ctaLabel" class="form-control" placeholder="Learn More" />
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="ctaUrl">CTA URL (optional)</label>
                                <input id="ctaUrl" type="url" name="ctaUrl" class="form-control" placeholder="https://example.com" />
                            </div>
                        </div>

                        <div th:if="${currentUser.role.name() != 'PERSONAL'}" class="form-group">
                            <label class="text-sm" style="display: inline-flex; align-items: center; gap: 0.45rem;">
                                <input type="checkbox" name="pinned" /> Pin this post to top
                            </label>
                        </div>

                        <div class="flex justify-between items-center mt-2">
                            <div class="text-xs text-muted">Posts support text, hashtags, image, CTA, and scheduling.</div>
                            <button class="btn btn-primary" type="submit">Publish Post</button>
                        </div>
                    </form>
                </div>

                <div class="card mb-6">
                    <form th:action="@{/feed}" method="get" class="grid" style="grid-template-columns: 1fr 1fr 1fr auto; gap: 0.6rem;">
                        <input type="text" name="hashtag" class="form-control" placeholder="Filter by hashtag"
                            th:value="${selectedHashtag}" />
                        <select name="type" class="form-control">
                            <option value="">All post types</option>
                            <option value="REGULAR" th:selected="${selectedType == 'REGULAR'}">Regular</option>
                            <option value="PROMOTIONAL" th:selected="${selectedType == 'PROMOTIONAL'}">Promotional</option>
                            <option value="ANNOUNCEMENT" th:selected="${selectedType == 'ANNOUNCEMENT'}">Announcement</option>
                            <option value="REPOST" th:selected="${selectedType == 'REPOST'}">Repost</option>
                        </select>
                        <select name="userRole" class="form-control">
                            <option value="">All user roles</option>
                            <option value="PERSONAL" th:selected="${selectedUserRole == 'PERSONAL'}">Personal</option>
                            <option value="CREATOR" th:selected="${selectedUserRole == 'CREATOR'}">Creator</option>
                            <option value="BUSINESS" th:selected="${selectedUserRole == 'BUSINESS'}">Business</option>
                        </select>
                        <button type="submit" class="btn btn-outline">Apply</button>
                    </form>
                </div>

                <div th:if="${posts == null or posts.empty}" class="card text-center py-16">
                    <p class="text-secondary">No posts found for the selected feed filters.</p>
                </div>

                <div th:each="post : ${posts}" class="card post mb-6">
                    <div class="post-header">
                        <div class="avatar" style="overflow: hidden;">
                            <img th:if="${post.author.profilePicture != null && !post.author.profilePicture.isEmpty()}"
                                th:src="@{${post.author.profilePicture}}" style="width: 100%; height: 100%; object-fit: cover;" alt="" />
                            <span th:if="${post.author.profilePicture == null || post.author.profilePicture.isEmpty()}"
                                th:text="${post.author.username.substring(0,1).toUpperCase()}"></span>
                        </div>
                        <div class="post-author">
                            <a th:href="@{'/profile/' + ${post.author.username}}" class="author-name"
                                th:text="${post.author.fullName ?: post.author.username}"></a>
                            <span class="post-time" th:text="${#temporals.format(post.createdAt,'dd MMM yyyy, HH:mm')}"></span>
                        </div>
                        <div style="margin-left: auto;" th:if="${post.author.id == currentUser.id}">
                            <form th:action="@{'/posts/' + ${post.id} + '/delete'}" method="post" class="confirm-delete">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-ghost btn-sm" style="color: var(--danger);">Delete</button>
                            </form>
                        </div>
                    </div>

                    <div class="post-content" th:text="${post.content}"></div>

                    <div th:if="${post.imageUrl != null and !post.imageUrl.isEmpty()}" class="mb-3">
                        <img th:src="@{${post.imageUrl}}" alt="Post image"
                            style="width: 100%; max-height: 500px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border-light);" />
                    </div>

                    <div class="mb-3" th:if="${post.hashtags != null and !#strings.isEmpty(post.hashtags)}">
                        <a th:each="tag : ${#strings.arraySplit(post.hashtags,',')}"
                            th:href="@{/posts/search(hashtag=${#strings.trim(tag).replace('#','')})}"
                            class="text-sm" style="margin-right: 0.5rem;"
                            th:text="${#strings.trim(tag).startsWith('#') ? #strings.trim(tag) : '#' + #strings.trim(tag)}"></a>
                    </div>

                    <div class="post-actions">
                        <form th:action="@{'/posts/' + ${post.id} + '/like'}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="action-item"><i data-lucide="heart"></i><span th:text="${post.likes.size()}">0</span></button>
                        </form>
                        <a th:href="@{'/posts/' + ${post.id}}" class="action-item"><i data-lucide="message-circle"></i><span th:text="${post.comments.size()}">0</span></a>
                        <form th:action="@{'/posts/' + ${post.id} + '/share'}" method="post" style="margin-left: auto;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="action-item"><i data-lucide="share-2"></i><span th:text="${post.shares.size()}">0</span></button>
                        </form>
                    </div>
                </div>

                <div th:if="${totalPages != null and totalPages > 1}" class="flex gap-2 justify-center mt-4">
                    <a th:if="${currentPage > 0}" th:href="@{/feed(page=${currentPage - 1})}" class="btn btn-outline btn-sm">Previous</a>
                    <span class="btn btn-sm" style="cursor: default;">Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">1</span></span>
                    <a th:if="${currentPage + 1 < totalPages}" th:href="@{/feed(page=${currentPage + 1})}" class="btn btn-outline btn-sm">Next</a>
                </div>
            </div>

            <aside class="sidebar-right">
                <div class="card mb-6">
                    <div class="widget-title">Search Users</div>
                    <form th:action="@{/profile/search}" method="get">
                        <input type="text" name="q" class="form-control" placeholder="Name or username" />
                        <button class="btn btn-outline btn-full mt-2" type="submit">Search</button>
                    </form>
                </div>

                <div class="card" th:if="${trendingHashtags != null and !trendingHashtags.empty}">
                    <div class="widget-title">Trending Hashtags</div>
                    <div class="flex" style="flex-wrap: wrap; gap: 0.45rem;">
                        <a th:each="tag : ${trendingHashtags}" th:href="@{/posts/search(hashtag=${#strings.replace(tag,'#','')})}"
                            class="btn btn-outline btn-sm" th:text="${tag}">#tag</a>
                    </div>
                </div>
            </aside>
        </div>
    </section>
</body>

</html>
