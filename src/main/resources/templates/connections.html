<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(layout_content=~{::section})}">

<head>
    <title>Connections - RevConnect</title>
</head>

<body>
    <section>
        <div class="container main-content" style="grid-template-columns: 1fr;">
            <div style="max-width: 980px; margin: 0 auto; width: 100%;">
                <div class="flex items-center justify-between mb-6">
                    <h1 style="font-size: 1.5rem; margin: 0;">Connections</h1>
                    <span class="badge" th:text="${connections.size()} + ' total'"></span>
                </div>

                <div class="card mb-6" th:if="${pendingReceived != null and !pendingReceived.empty}">
                    <h3 style="margin-bottom: 0.9rem;">Pending Requests Received</h3>
                    <div th:each="conn : ${pendingReceived}" class="flex items-center justify-between mb-3 pb-3" style="border-bottom: 1px solid var(--border-light);">
                        <div>
                            <a th:href="@{'/profile/' + ${conn.sender.username}}" class="font-bold"
                                th:text="${conn.sender.fullName ?: conn.sender.username}"></a>
                            <div class="text-xs text-muted" th:text="'@' + ${conn.sender.username}"></div>
                        </div>
                        <div class="flex gap-2">
                            <form th:action="@{'/connections/' + ${conn.id} + '/accept'}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-primary btn-sm">Accept</button>
                            </form>
                            <form th:action="@{'/connections/' + ${conn.id} + '/reject'}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-outline btn-sm">Reject</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="grid" style="grid-template-columns: 2fr 1fr; gap: 1rem;">
                    <div class="card">
                        <h3 style="margin-bottom: 0.9rem;">Your Network</h3>
                        <div th:if="${connections.empty}" class="text-muted">No accepted connections yet.</div>
                        <div th:each="user : ${connections}" class="flex items-center justify-between mb-3 pb-3" style="border-bottom: 1px solid var(--border-light);">
                            <div>
                                <a th:href="@{'/profile/' + ${user.username}}" class="font-bold"
                                    th:text="${user.fullName ?: user.username}"></a>
                                <div class="text-xs text-muted" th:text="'@' + ${user.username}"></div>
                            </div>
                            <div class="flex gap-2">
                                <a th:href="@{'/messages/' + ${user.id}}" class="btn btn-outline btn-sm">Message</a>
                                <form th:action="@{'/connections/remove/' + ${user.id}}" method="post" class="confirm-delete">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-ghost btn-sm" style="color: var(--danger);">Remove</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="card mb-6">
                            <h3 style="margin-bottom: 0.8rem;">Find Users</h3>
                            <form th:action="@{/profile/search}" method="get">
                                <input type="text" name="q" class="form-control" placeholder="Name or username" />
                                <button type="submit" class="btn btn-outline btn-full mt-2">Search</button>
                            </form>
                        </div>

                        <div class="card">
                            <h3 style="margin-bottom: 0.8rem;">Pending Requests Sent</h3>
                            <div th:if="${pendingSent.empty}" class="text-muted">No outgoing pending requests.</div>
                            <div th:each="conn : ${pendingSent}" class="mb-2">
                                <a th:href="@{'/profile/' + ${conn.receiver.username}}" th:text="${conn.receiver.fullName ?: conn.receiver.username}"></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
