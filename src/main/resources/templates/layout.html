<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:fragment="layout(layout_content)">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageTitle != null ? pageTitle + ' - RevConnect' : 'RevConnect'}">RevConnect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    (function () {
      try {
        var t = localStorage.getItem('revconnect_theme');
        if (!t) {
          t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <script src="https://unpkg.com/lucide@latest"></script>
  <link th:href="@{/css/styles.css}" rel="stylesheet" />
  <th:block th:fragment="head-extra"></th:block>
</head>

<body>
  <nav class="navbar">
    <div class="container" style="display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 1rem;">
      <a th:href="@{/}" class="logo" style="display: flex; align-items: center; gap: 0.5rem;">
        <span class="logo-text">RevConnect</span>
      </a>

      <div style="display: flex; align-items: center; gap: 0.6rem;">
        <button type="button" class="btn btn-outline btn-sm" data-theme-toggle>Dark</button>

        <div class="nav-menu" th:if="${currentUser != null}" style="display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap;">
          <a th:href="@{/feed}" class="nav-link">Feed</a>
          <a th:href="@{/messages}" class="nav-link">Messages</a>
          <a th:href="@{/connections}" class="nav-link">Network</a>
          <a th:href="@{/notifications}" class="nav-link" style="position: relative;">
            <i data-lucide="bell" style="width: 16px;"></i>
            <span class="badge" th:if="${unreadCount != null && unreadCount > 0}" th:text="${unreadCount}"
              style="position: absolute; top: -5px; right: -4px;"></span>
          </a>

          <div style="display: flex; align-items: center; gap: 0.65rem; margin-left: 0.35rem; padding-left: 0.65rem; border-left: 1px solid var(--border-light);">
            <a th:href="@{/profile}" class="avatar"
              style="width: 30px; height: 30px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 0.8rem;">
              <img th:if="${currentUser.profilePicture != null && !currentUser.profilePicture.isEmpty()}"
                th:src="@{${currentUser.profilePicture}}" style="width: 100%; height: 100%; object-fit: cover;" alt="" />
              <span th:if="${currentUser.profilePicture == null || currentUser.profilePicture.isEmpty()}"
                th:text="${currentUser.username.substring(0,1).toUpperCase()}"
                style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--bg-soft); color: var(--text-secondary);"></span>
            </a>

            <form th:action="@{/logout}" method="post" style="margin: 0;">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button type="submit" style="background: none; border: none; cursor: pointer; color: var(--text-muted); display: inline-flex; align-items: center;">
                <i data-lucide="log-out" style="width: 16px;"></i>
              </button>
            </form>
          </div>
        </div>

        <div class="nav-menu" th:if="${currentUser == null}" style="display: flex; gap: 0.6rem; align-items: center;">
          <a th:href="@{/login}" class="btn btn-ghost btn-sm">Log In</a>
          <a th:href="@{/register}" class="btn btn-primary btn-sm">Create Account</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container mt-4" style="padding: 0 1rem; position: relative; z-index: 100;">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
  </div>

  <div th:replace="${layout_content}"></div>

  <script>
    lucide.createIcons();
  </script>
  <script th:src="@{/js/main.js}"></script>
</body>

</html>
