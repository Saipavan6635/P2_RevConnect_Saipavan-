<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:fragment="layout(layout_content)">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageTitle != null ? pageTitle + ' — RevConnect' : 'RevConnect'}">RevConnect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet" />

  <script src="https://unpkg.com/lucide@latest"></script>
  <link th:href="@{/css/styles.css}" rel="stylesheet" />
  <th:block th:fragment="head-extra"></th:block>
</head>

<body>
  <!-- Minimal Floating Navbar -->
  <nav class="navbar" th:if="${currentUser != null}">
    <div class="container" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
      <a th:href="@{/feed}" class="logo"
        style="display: flex; align-items: center; gap: 0.5rem; font-size: 1.5rem; font-weight: 600;">
        <i data-lucide="sparkles" class="icon-sky" style="width: 24px;"></i>
        <span class="text-gradient">RevConnect</span>
      </a>

      <div class="nav-menu" style="display: flex; gap: 1rem; align-items: center;">
        <a th:href="@{/feed}" class="nav-link">Feed</a>
        <a th:href="@{/messages}" class="nav-link">Talk</a>
        <a th:href="@{/connections}" class="nav-link">Network</a>
        <a th:href="@{/notifications}" class="nav-link" style="position: relative;">
          <i data-lucide="bell" style="width: 20px;"></i>
          <span class="badge" th:if="${unreadCount != null && unreadCount > 0}" th:text="${unreadCount}"
            style="position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 50%;"></span>
        </a>

        <div
          style="display: flex; align-items: center; gap: 1rem; margin-left: 1rem; padding-left: 1rem; border-left: 1px solid var(--border-light);">
          <a th:href="@{/profile}" class="avatar"
            style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 500;">
            <img th:if="${currentUser.profilePicture != null && !currentUser.profilePicture.isEmpty()}"
              th:src="@{${currentUser.profilePicture}}" style="width: 100%; height: 100%; object-fit: cover;" alt="" />
            <span th:if="${currentUser.profilePicture == null || currentUser.profilePicture.isEmpty()}"
              th:text="${currentUser.username.substring(0,1).toUpperCase()}"
              style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--primary-gradient); color: white;"></span>
          </a>

          <form th:action="@{/logout}" method="post" style="margin: 0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" style="background: none; border: none; cursor: pointer; color: var(--text-muted);">
              <i data-lucide="log-out" style="width: 18px;"></i>
            </button>
          </form>
        </div>
      </div>
    </div>
  </nav>

  <!-- CONTENT INJECTION -->
  <div th:replace="${layout_content}"></div>

  <script>
    lucide.createIcons();
  </script>
  <script th:src="@{/js/main.js}"></script>
</body>

</html>
